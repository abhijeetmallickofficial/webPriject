<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Dipuuu ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff4e8b,#ff9a9e,#fad0c4);
}

.container{
    text-align:center;
    z-index:10;
}

button{
    padding:18px 40px;
    font-size:22px;
    border:none;
    border-radius:40px;
    background:white;
    color:#ff0066;
    cursor:pointer;
    box-shadow:0 0 20px rgba(255,255,255,.7);
    transition:.3s;
}

button:hover{
    transform:scale(1.1);
}

#message{
    display:none;
    color:white;
    font-size:60px;
    font-weight:bold;
    text-shadow:0 0 20px #fff;
    animation:zoom 2s ease forwards;
}

@keyframes zoom{
    0%{
        transform:scale(0);
        opacity:0;
    }
    60%{
        transform:scale(1.3);
        opacity:1;
    }
    100%{
        transform:scale(1);
        opacity:1;
    }
}

.heart{
    position:absolute;
    color:red;
    font-size:25px;
    animation:float 6s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(0.5);
        opacity:1;
    }
    100%{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
    }
}
</style>

</head>
<body>

<div class="container">
    <button id="btn" onclick="startLove()">💖 Click Here 💖</button>

    <div id="message">
        ❤️<br>
        I LOVE YOU<br>
        Dipuuu 💖
    </div>
</div>

<script>
function createHeart(){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(20+Math.random()*40)+"px";
    heart.style.animationDuration=(3+Math.random()*4)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },7000);
}

let interval;

function startLove(){

    document.getElementById("btn").style.display="none";
    document.getElementById("message").style.display="block";

    interval=setInterval(createHeart,120);

    document.body.animate([
        {transform:"scale(1)"},
        {transform:"scale(1.03)"},
        {transform:"scale(1)"}
    ],{
        duration:1500,
        iterations:Infinity
    });
}
</script>

</body>
</html>
