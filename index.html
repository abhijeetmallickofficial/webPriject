<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Dipuu ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url("love.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.card{
    text-align:center;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(12px);
    padding:40px;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
    color:white;
    max-width:900px;
}

h1{
    font-family:'Great Vibes', cursive;
    font-size:4rem;
    color:#fff;
    text-shadow:
        0 0 10px #ff99cc,
        0 0 20px #ff66b2,
        0 0 40px #ff3399;
    margin-bottom:30px;
    animation:titleGlow 2s ease-in-out infinite alternate;
}

@keyframes titleGlow{
    from{
        transform:scale(1);
        text-shadow:
            0 0 10px #ff99cc,
            0 0 20px #ff66b2;
    }
    to{
        transform:scale(1.05);
        text-shadow:
            0 0 20px #ff99cc,
            0 0 40px #ff3399,
            0 0 60px #ff0066;
    }
}

button{
    font-family:'Poppins', sans-serif;
    font-size:22px;
    font-weight:600;
    padding:16px 42px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    transition:.35s;
    box-shadow:0 8px 25px rgba(255,255,255,.25);
}

button:hover{
    transform:translateY(-4px) scale(1.08);
    box-shadow:0 12px 35px rgba(255,255,255,.45);
}

#yes{
    background:#28a745;
    color:white;
}

#no{
    background:#ff1744;
    color:white;
}

#lovePage{
    display:none;
    text-align:center;
}

.message{
    font-family:'Great Vibes', cursive;
    font-size:5rem;
    color:#fff;
    text-align:center;
    text-shadow:
        0 0 10px #ff99cc,
        0 0 20px #ff66b2,
        0 0 35px #ff3399,
        0 0 60px #ff0066;
    animation:loveGlow 2s ease-in-out infinite alternate;
}

@keyframes loveGlow{
    from{
        transform:scale(1);
        letter-spacing:2px;
    }
    to{
        transform:scale(1.08);
        letter-spacing:5px;
    }
}

.photos{
    display:flex;
    justify-content:center;
    gap:50px;
    flex-wrap:wrap;
    margin-top:35px;
}

.photo-frame{
    width:230px;
    height:230px;
    border-radius:50%;
    overflow:hidden;
    border:6px solid white;
    box-shadow:0 0 30px white;
    animation:zoom 2s infinite alternate;
}

.photo-frame img{
    width:100%;
    height:100%;
    object-fit:cover;

    /* Adjust these values */
    object-position:50% 25%;
}

@keyframes zoom{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.08);
    }
}

.heart{
    position:absolute;
    color:#ff1744;
    animation:float linear forwards;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(.5);
        opacity:1;
    }

    to{
        transform:translateY(-120vh) scale(2);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card" id="question">

    <h1>💖 Dipu, Will You Be Mine Forever? 💖</h1>

    <button id="yes" onclick="yesClicked()">YES ❤️</button>

    <button id="no" onclick="noClicked()">NO 💔</button>

</div>

<div class="card" id="lovePage">

    <div class="message">
        ❤️ I LOVE YOU DIPU ❤️
    </div>

    <div class="photos">

        <div class="photo-frame">
            <img src="IMG_3144.jpg" alt="Me">
        </div>

        <div class="photo-frame">
            <img src="AD494B42-BFD3-4AA6-9B90-B5FA6FC50ECA.JPG" alt="Dipti">
        </div>

    </div>

</div>

<audio id="music" loop>
    <source src="my new one.mp3" type="audio/mpeg">
</audio>

<script>

function yesClicked(){

    document.getElementById("question").style.display="none";
    document.getElementById("lovePage").style.display="block";

    document.getElementById("music").play();

    setInterval(createHeart,120);
}

function noClicked(){

    alert("😊 Thank you for answering.");
}

function createHeart(){

    let heart=document.createElement("div");

    heart.className="heart";

    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=(20+Math.random()*50)+"px";

    heart.style.animationDuration=(3+Math.random()*3)+"s";

    document.body.appendChild(heart);

    setTimeout(function(){
        heart.remove();
    },6000);
}
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseenter", moveButton);
noBtn.addEventListener("click", moveButton);

function moveButton() {
    const padding = 20;

    const maxX = window.innerWidth - noBtn.offsetWidth - padding;
    const maxY = window.innerHeight - noBtn.offsetHeight - padding;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}


</script>

</body>
</html>
